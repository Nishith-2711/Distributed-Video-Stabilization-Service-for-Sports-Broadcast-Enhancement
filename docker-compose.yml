version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./frontend:/app/frontend
      - ./api:/app/api
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  worker:
    build: .
    command: rq worker video-processing --url redis://redis:6379
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./api:/app/api
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
